services:
  postgres:
    image: postgres:16
    container_name: puntdl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-punt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-punt}
      POSTGRES_DB: ${POSTGRES_DB:-puntdl}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./bbdd/dumps:/dumps:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
